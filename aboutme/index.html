<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      (function() {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const savedTheme = localStorage.getItem("theme");
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
      })();
    </script>
    <title>About Me - Qiiii's Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Oleo Script Swash Caps:400,600" rel="stylesheet">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/aboutme.css">
  </head>
  <body>
    <header class="site-header">
      <a class="site-logo" href="../home/">Qiiii's Site</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="../home/" class="nav-zh" data-en="HOME"><span>首页</span></a>
        <a href="../work/" class="nav-zh" data-en="WORKS"><span>作品</span></a>
        <a href="../aboutme/" class="nav-zh" data-en="ABOUT ME" aria-current="page"><span>关于我</span></a>
        <div class="nav-theme-toggle">
          <button id="navThemeToggle" aria-label="Toggle theme">
            <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
            <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <svg class="icon-hamburger" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg class="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

          <div class="photo-row-portrait">
            <div class="photo-track">

              <img src="../assets/images/aboutme/Personal5.jpg" alt="Personal" class="portrait">

          <div class="photo-asymmetric">
            <img src="../assets/images/aboutme/Scene4.JPG" alt="Scene">

          <div class="photo-row-portrait">

              <img src="../assets/images/aboutme/Personal7.JPG" alt="Personal" class="portrait">
              <img src="../assets/images/aboutme/Scene17.JPG" alt="Scene" class="portrait">
              <img src="../assets/images/aboutme/Personal6.png" alt="Personal" class="portrait">
              <img src="../assets/images/aboutme/Scene13.jpg" alt="Scene" class="portrait">
              <img src="../assets/images/aboutme/Personal4.jpg" alt="Personal" class="portrait">
              <img src="../assets/images/aboutme/Scene1.jpg" alt="Scene" class="portrait">
              <img src="../assets/images/aboutme/Personal7.JPG" alt="Personal" class="portrait">
              <img src="../assets/images/aboutme/Scene17.JPG" alt="Scene" class="portrait">
              <img src="../assets/images/aboutme/Personal6.png" alt="Personal" class="portrait">
              <img src="../assets/images/aboutme/Scene13.jpg" alt="Scene" class="portrait">

          </div>

          <img src="../assets/images/aboutme/Scene7.JPG" alt="Scene" class="photo-full">

          <div class="photo-carousel">
            <img src="../assets/images/aboutme/Scene3.JPG" alt="Scene" class="active">
            <img src="../assets/images/aboutme/Scene8.JPG" alt="Scene">
            <img src="../assets/images/aboutme/Scene9.JPG" alt="Scene">

          <div class="photo-carousel">
            <img src="../assets/images/aboutme/Scene10.JPG" alt="Scene" class="active">

      <footer class="site-footer">
