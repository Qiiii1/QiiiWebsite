<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      (function() {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const savedTheme = localStorage.getItem("theme");
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
      })();
    </script>
    <title>DrumGo - Qiiii's Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Oleo Script Swash Caps:400,600" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/layout.css">
    <link rel="stylesheet" href="../../styles/project.css">
  </head>
  <body>
    <header class="site-header">
      <a class="site-logo" href="../../home/">Qiiii's Site</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="../../home/" class="nav-zh" data-en="HOME"><span>首页</span></a>
        <a href="../" class="nav-zh" data-en="WORKS" aria-current="page"><span>作品</span></a>
        <a href="../../aboutme/" class="nav-zh" data-en="ABOUT ME"><span>关于我</span></a>
      </nav>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <svg class="icon-hamburger" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg class="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </header>

    <div class="smooth-content">
      <main class="project-page">
        <section class="page-shell project-hero reveal-section section-visible" data-cursor-glow data-reveal-section data-lag="0.035">
        <a class="back-link reveal" href="../">Back to Work</a>
        <p class="section-kicker reveal">Project 02</p>
        <h1 class="reveal">DrumGo</h1>
        <p class="project-lede reveal">面向节奏训练和音乐练习的移动端体验，强调节拍反馈、路径清晰和工具感。</p>
        <img class="project-cover reveal" src="../../assets/images/work/Drumgo封面.png" alt="DrumGo project cover">
      </section>

      <section class="page-shell project-detail-grid reveal-section" data-reveal-section data-lag="0.045">
        <article class="detail-card reveal">
          <span>Role</span>
          <h2>Product design</h2>
        </article>
        <article class="detail-card reveal">
          <span>Focus</span>
          <h2>Rhythm interaction</h2>
        </article>
        <article class="detail-card reveal">
          <span>Output</span>
          <h2>Mobile app prototype</h2>
        </article>
      </section>

      <section class="page-shell media-strip reveal-section" data-reveal-section data-lag="0.055">
        <img class="reveal" src="../../assets/images/projects/DrumGo-2.jpg" alt="DrumGo detail 2" loading="lazy">
        <img class="reveal" src="../../assets/images/projects/DrumGo-3.jpg" alt="DrumGo detail 3" loading="lazy">
        <img class="reveal" src="../../assets/images/projects/DrumGo-4.jpg" alt="DrumGo detail 4" loading="lazy">
      </section>
      </main>
    </div>

    <script src="../../scripts/main.js"></script>
    <script src="../../scripts/project.js"></script>
  </body>
</html>
